name: PR — Release-plz
on:
  push:
    branches:
      - master
jobs:
  release-pr:
    name: Release PR
    runs-on: ubuntu-latest
    if: github.repository_owner == 'mammothb'
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: PR - release-plz
        uses: release-plz/action@2eb1d8bcb770b4c48ccfaad919734b38b51958c9 # v0.5.131
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ github.token }}
