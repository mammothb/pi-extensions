name: CI
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.filter.outputs.changes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Paths filter
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          filters: |
            npm:
              - 'packages/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
            cargo:
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
  npm:
    name: npm
    needs: changes
    if: ${{ contains(needs.changes.outputs.packages, 'npm') }}
    uses: ./.github/workflows/reusable-ci-npm.yml
  cargo:
    name: cargo
    needs: changes
    if: ${{ contains(needs.changes.outputs.packages, 'cargo') }}
    uses: ./.github/workflows/reusable-ci-cargo.yml
